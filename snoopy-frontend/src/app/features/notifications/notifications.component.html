<div class="page-header">
  <div>
    <h2>{{ 'การแจ้งเตือน' | t }}</h2>
    <p *ngIf="unreadCount > 0">{{ 'ยังไม่ได้อ่าน' | t }} {{ unreadCount }} {{ 'รายการ' | t }}</p>
    <p *ngIf="unreadCount === 0">{{ 'อ่านทั้งหมดแล้ว' | t }}</p>
  </div>
  <div class="page-header-actions">
    <button class="btn btn-ghost" (click)="markAll()" [disabled]="markingAll || unreadCount===0">
      {{ (markingAll ? 'กำลังดำเนินการ...' : 'อ่านทั้งหมด') | t }}
    </button>
  </div>
</div>

<!-- Filter tabs -->
<div class="tab-bar" style="margin-bottom:20px">
  <button class="tab-btn" [class.active]="filter==='all'" (click)="filter='all'">
    {{ 'ทั้งหมด' | t }} ({{ notifications.length }})
  </button>
  <button class="tab-btn" [class.active]="filter==='unread'" (click)="filter='unread'">
    {{ 'ยังไม่ได้อ่าน' | t }} ({{ unreadCount }})
  </button>
</div>

<div *ngIf="loading" style="text-align:center;padding:60px;color:var(--text-muted)">{{ 'กำลังโหลด...' | t }}</div>

<div *ngIf="!loading">
  <div *ngIf="displayed.length === 0" class="empty-state" style="padding:60px 24px">
    <div class="empty-state-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    </div>
    <div class="empty-state-title">ไม่มีการแจ้งเตือน</div>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <div
      *ngFor="let n of displayed; let last = last"
      style="display:flex;gap:14px;padding:14px 18px;cursor:pointer;transition:background .15s"
      [style.background]="n.is_read ? 'transparent' : 'var(--primary-faint)'"
      [style.border-bottom]="last ? 'none' : '1px solid var(--border)'"
      (click)="markRead(n)"
    >
      <!-- Icon -->
      <div
        style="width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0"
        [style.background]="iconBg(n.type)"
      >
        <span class="mi" [style.color]="iconColor(n.type)">{{ icon(n.type) }}</span>
      </div>

      <!-- Content -->
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="font-size:.9rem;font-weight:600;color:var(--text-primary)">{{ n.title }}</div>
          <div style="font-size:.75rem;color:var(--text-muted);white-space:nowrap;flex-shrink:0">{{ formatDate(n.created_at) }}</div>
        </div>
        <div style="font-size:.83rem;color:var(--text-secondary);margin-top:3px">{{ n.message }}</div>
      </div>

      <!-- Unread dot -->
      <div
        *ngIf="!n.is_read"
        style="width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:6px"
      ></div>
    </div>
  </div>
</div>
