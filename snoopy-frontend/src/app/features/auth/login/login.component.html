<div class="login-bg">

  <!-- Floating clouds -->
  <div class="login-cloud login-cloud--1"></div>
  <div class="login-cloud login-cloud--2"></div>
  <div class="login-cloud login-cloud--3"></div>

  <!-- Airplane flying across the sky (with banner) -->
  <div class="login-plane">
    <svg width="120" height="46" viewBox="0 0 120 46" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- banner -->
      <path d="M44 16 L4 12 L10 18 L4 24 L44 20Z" fill="#ffd23f" stroke="#1f2933" stroke-width="2"/>
      <line x1="44" y1="18" x2="62" y2="18" stroke="#1f2933" stroke-width="2"/>
      <!-- plane body -->
      <path d="M62 10 q22 -2 40 8 q-8 8 -22 8 l-18 2 Z" fill="#fff" stroke="#1f2933" stroke-width="2.5"/>
      <path d="M70 18 l8 12 l6 -1 l-3 -12Z" fill="#4a90d9" stroke="#1f2933" stroke-width="2"/>
      <path d="M84 16 l4 -10 l5 0 l-1 11Z" fill="#4a90d9" stroke="#1f2933" stroke-width="2"/>
      <circle cx="92" cy="17" r="2.4" fill="#4a90d9"/>
    </svg>
  </div>

  <!-- Grass field with mascots playing/chasing -->
  <div class="login-field">
    <div class="login-hill login-hill--back"></div>
    <div class="login-hill login-hill--front"></div>

    <!-- doghouse (right side) -->
    <div class="login-doghouse">
      <svg width="110" height="100" viewBox="0 0 110 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- roof -->
        <path d="M12 44 L55 12 L98 44 Z" fill="#e0556b" stroke="#1f2933" stroke-width="3.5" stroke-linejoin="round"/>
        <path d="M55 12 L55 20 L88 44 L98 44Z" fill="#c43d50"/>
        <!-- body -->
        <rect x="22" y="44" width="66" height="50" rx="4" fill="#c98a5e" stroke="#1f2933" stroke-width="3.5"/>
        <!-- door arch -->
        <path d="M42 94 L42 66 a13 13 0 0 1 26 0 L68 94 Z" fill="#1f2933"/>
        <!-- name plate -->
        <rect x="44" y="48" width="22" height="11" rx="3" fill="#ffd23f" stroke="#1f2933" stroke-width="2"/>
        <path d="M55 50.5c-1.6 1.6-2.4 2.4-2.4 3.4a1.3 1.3 0 0 0 2 .8c-.2.7-.5 1.1-.95 1.4h2.7c-.45-.3-.75-.7-.95-1.4a1.3 1.3 0 0 0 2-.8c0-1-.8-1.8-2.4-3.4Z" fill="#1f2933"/>
      </svg>
    </div>

    <!-- keeper / owner (left side) waving -->
    <div class="login-keeper">
      <svg width="64" height="120" viewBox="0 0 64 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- legs -->
        <path d="M26 78 L24 112" stroke="#3a4a70" stroke-width="9" stroke-linecap="round"/>
        <path d="M38 78 L40 112" stroke="#3a4a70" stroke-width="9" stroke-linecap="round"/>
        <!-- body -->
        <rect x="18" y="46" width="28" height="38" rx="12" fill="#4a90d9" stroke="#1f2933" stroke-width="3"/>
        <!-- waving arm -->
        <path d="M44 52 q14 -4 16 -20" stroke="#1f2933" stroke-width="7" fill="none" stroke-linecap="round" class="keeper-arm"/>
        <!-- other arm -->
        <path d="M20 54 q-8 6 -8 18" stroke="#1f2933" stroke-width="7" fill="none" stroke-linecap="round"/>
        <!-- head -->
        <circle cx="32" cy="30" r="15" fill="#f0c89a" stroke="#1f2933" stroke-width="3"/>
        <!-- cap -->
        <path d="M16 28 a16 16 0 0 1 32 0 Z" fill="#e0556b" stroke="#1f2933" stroke-width="3"/>
        <path d="M44 28 l12 3 l-12 3Z" fill="#e0556b" stroke="#1f2933" stroke-width="2"/>
        <!-- face -->
        <circle cx="27" cy="31" r="1.8" fill="#1f2933"/>
        <circle cx="37" cy="31" r="1.8" fill="#1f2933"/>
        <path d="M28 36 q4 3 8 0" stroke="#1f2933" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- pack of mascots running & chasing each other -->
    <div class="login-runner login-runner--a"><app-mascot [size]="120" mood="cheer" [animate]="true"></app-mascot></div>
    <div class="login-runner login-runner--b"><app-mascot [size]="92"  mood="happy" [animate]="true"></app-mascot></div>
    <div class="login-runner login-runner--c"><app-mascot [size]="76"  mood="wave"  [animate]="true"></app-mascot></div>
    <div class="login-runner login-runner--d"><app-mascot [size]="64"  mood="happy" [animate]="true"></app-mascot></div>

    <!-- little tufts of grass -->
    <span class="grass-tuft" style="left:8%"></span>
    <span class="grass-tuft" style="left:22%"></span>
    <span class="grass-tuft" style="left:40%"></span>
    <span class="grass-tuft" style="right:14%"></span>
    <span class="grass-tuft" style="right:28%"></span>
  </div>

  <div class="login-card">

    <div class="login-logo">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none" aria-hidden="true">
        <rect x="2" y="2" width="52" height="52" rx="16" fill="#2d7dd2" stroke="#20303f" stroke-width="3"/>
        <!-- bridge card suits: spade + heart -->
        <path d="M20 14c-5 4-8 7-8 11a4.5 4.5 0 0 0 7 3.7c-.3 2-1.3 3.3-2.6 4.3h7.2c-1.3-1-2.3-2.3-2.6-4.3a4.5 4.5 0 0 0 7-3.7c0-4-3-7-8-11Z" fill="#fffdf6"/>
        <path d="M37 30c-2.2-2.4-5.6-2.3-6.9.4-1.3-2.7-4.7-2.8-6.9-.4-2.6 2.9-1 6.7 6.9 12 7.9-5.3 9.5-9.1 6.9-12Z" fill="#ffd23f"/>
      </svg>
      <div>
        <h1 class="login-title">SNOOPY</h1>
        <p class="login-subtitle">{{ 'ระบบจัดการนักกีฬาบริดจ์เยาวชนทีมชาติ' | t }}</p>
      </div>
    </div>

    <div class="login-divider"></div>

    <p class="login-desc">{{ 'กรุณาเข้าสู่ระบบด้วยบัญชี Google ที่ลงทะเบียนไว้กับระบบ' | t }}</p>

    <button class="btn-google" (click)="loginWithGoogle()" [disabled]="loading">
      <span *ngIf="loading" class="spinner"></span>
      <svg *ngIf="!loading" width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      {{ (loading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบด้วย Google') | t }}
    </button>

    <div class="login-error" *ngIf="error">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      {{ error }}
    </div>

    <p class="login-footer">{{ 'สำหรับนักกีฬา โค้ช และเจ้าหน้าที่ที่ได้รับการลงทะเบียนเท่านั้น' | t }}</p>
    <p class="login-footer" style="margin-top:8px">
      © {{ copyrightYear }} {{ author }} · {{ 'เวอร์ชัน' | t }} {{ appVersion }}
    </p>
  </div>
</div>
